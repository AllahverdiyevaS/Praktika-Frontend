<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <h1 class="todo_title">Todo List Sehifesi</h1>
    <form id="form">
      <input class="input_text" type="text" placeholder="Enter a new task" />
      <br />
      <button class="add_todo">Add Task</button>
    </form>
    <div class="container">
      <h2 class="todo_list_title">Todo List</h2>
      <ul class="todo_list"></ul>
    </div>
    <button class="clear_button">Clear</button>

    <form class="search_form">
      <input id="search" type="search" placeholder="Search tasks..." />
    </form>

    <script src="./script.js"></script>
  </body>
</html>
